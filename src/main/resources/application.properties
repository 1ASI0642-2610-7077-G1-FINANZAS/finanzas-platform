# =============================================
# CREDITO VEHICULAR - CONFIGURACION PRINCIPAL
# UPC Finanzas e Ingenieria Economica 2026
# =============================================

# Server
server.port=${PORT:8080}

# =============================================
# DATABASE - Railway provee MYSQLHOST, MYSQLPORT, etc.
# =============================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:credito_vehicular_db}?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT
# =============================================
jwt.secret=${JWT_SECRET:creditovehicularupc2026secretkey32caracteres!!}
jwt.expiration=86400000

# =============================================
# APP
# =============================================
spring.application.name=credito-vehicular

ip.frontend=${FRONTEND_URL:http://localhost:4200}
