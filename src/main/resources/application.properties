# =============================================
# CREDITO VEHICULAR - CONFIGURACION PRINCIPAL
# UPC Finanzas e Ingenieria Economica 2026
# =============================================

# Server
server.port=${PORT:8080}

# =============================================
# DATABASE - Variables de entorno en produccion
# =============================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/credito_vehicular_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT
# =============================================
jwt.secret=${JWT_SECRET:creditovehicularupc2026secretkey32caracteres!!}
jwt.expiration=86400000

# =============================================
# APP
# =============================================
spring.application.name=credito-vehicular

ip.frontend=${FRONTEND_URL:http://localhost:4200}
